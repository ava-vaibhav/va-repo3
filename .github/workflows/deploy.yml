name: Versori Deploy



on:

  workflow_dispatch:

    inputs:

      branch:

        description: "Branch to deploy"

        required: true

        default: "cicd-test"

        type: string

      dry_run:

        description: "List files that would deploy; skip real Versori deploy"

        required: false

        default: false

        type: boolean



# Repository variables (Settings → Secrets and variables → Actions → Variables):

#   VERSORI_ORG_ID, VERSORI_PROJECT_ID, VERSORI_PROJECT_ENV, VERSORI_DEPLOY_DIRECTORY

# Repository secrets:

#   VERSORI_SIGNING_KEY_ID, VERSORI_EXTERNAL_USER_ID, VERSORI_PRIVATE_KEY



env:

  DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}

  GITHUB_SHA: ${{ github.sha }}

  VERSORI_SIGNING_KEY_ID: ${{ secrets.VERSORI_SIGNING_KEY_ID }}

  VERSORI_EXTERNAL_USER_ID: ${{ secrets.VERSORI_EXTERNAL_USER_ID }}

  VERSORI_PRIVATE_KEY: ${{ secrets.VERSORI_PRIVATE_KEY }}

  VERSORI_ORG_ID: ${{ vars.VERSORI_ORG_ID }}

  VERSORI_PROJECT_ID: ${{ vars.VERSORI_PROJECT_ID }}

  VERSORI_PROJECT_ENV: ${{ vars.VERSORI_PROJECT_ENV }}

  VERSORI_DEPLOY_DIRECTORY: ${{ vars.VERSORI_DEPLOY_DIRECTORY }}



jobs:

  deploy:

    name: Deploy from ${{ github.event.inputs.branch || github.ref_name }}

    runs-on: ubuntu-latest

    timeout-minutes: 15



    steps:

      - name: Checkout va-repo

        uses: actions/checkout@v4

        with:

          ref: ${{ github.event.inputs.branch || github.ref_name }}



      - name: Show deployment context

        run: |

          echo "=== Deployment context ==="

          echo "Repository:       ${{ github.repository }}"

          echo "Requested branch: ${{ github.event.inputs.branch || github.ref_name }}"

          echo "Checked out ref:  ${{ github.ref }}"

          echo "Commit SHA:       ${{ github.sha }}"

          echo "Triggered by:     ${{ github.actor }}"

          echo "Dry run:          ${{ github.event.inputs.dry_run }}"

          echo "Deploy directory: ${VERSORI_DEPLOY_DIRECTORY:-. (repo root)}"

          echo "Workflow run:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"



      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

          cache: pip

          cache-dependency-path: requirements.txt



      - name: Install dependencies

        run: |

          echo "=== Installing dependencies ==="

          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip list



      - name: Validate configuration

        run: |

          echo "=== Configuration check ==="

          test -n "$VERSORI_SIGNING_KEY_ID" || (echo "Missing VERSORI_SIGNING_KEY_ID secret" && exit 1)

          test -n "$VERSORI_EXTERNAL_USER_ID" || (echo "Missing VERSORI_EXTERNAL_USER_ID secret" && exit 1)

          test -n "$VERSORI_PRIVATE_KEY" || (echo "Missing VERSORI_PRIVATE_KEY secret" && exit 1)

          test -n "$VERSORI_ORG_ID" || (echo "Missing VERSORI_ORG_ID variable" && exit 1)

          test -n "$VERSORI_PROJECT_ENV" || (echo "Missing VERSORI_PROJECT_ENV variable" && exit 1)



          DEPLOY_DIR="${VERSORI_DEPLOY_DIRECTORY:-.}"

          DEPLOY_DIR="${DEPLOY_DIR// /}"

          if [ -z "$DEPLOY_DIR" ] || [ "$DEPLOY_DIR" = "." ]; then

            DEPLOY_DIR="."

          fi

          test -d "$DEPLOY_DIR" || (echo "Deploy directory not found: $DEPLOY_DIR" && exit 1)



          if [ -f "$DEPLOY_DIR/.versori" ]; then

            echo "Project ID source:  .versori in $DEPLOY_DIR (VERSORI_PROJECT_ID optional)"

          else

            test -n "$VERSORI_PROJECT_ID" || (echo "Missing VERSORI_PROJECT_ID variable (no .versori in $DEPLOY_DIR)" && exit 1)

            echo "Project ID source:  VERSORI_PROJECT_ID"

          fi



          echo "Signing key ID:     configured"

          echo "External user ID:   configured"

          echo "Private key:        configured (${#VERSORI_PRIVATE_KEY} chars)"

          echo "Org ID:             $VERSORI_ORG_ID"

          echo "Project ID:         ${VERSORI_PROJECT_ID:-from .versori}"

          echo "Project env:        $VERSORI_PROJECT_ENV"

          echo "Deploy directory:   $DEPLOY_DIR"



      - name: Run deploy.py

        run: |

          echo "=== Running deploy.py ==="

          ARGS=(--branch "$DEPLOY_BRANCH")

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then

            ARGS+=(--dry-run)

          fi

          python deploy.py "${ARGS[@]}"



      - name: Deployment result

        if: always()

        run: |

          echo "=== Deployment finished ==="

          echo "Job status: ${{ job.status }}"

          echo "Branch:     $DEPLOY_BRANCH"

          echo "Commit:     ${{ github.sha }}"


